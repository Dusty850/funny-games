<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Menu</title>
    <style>
        /* Hidden by default until password is correct */
        #main-content {
            display: none;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background: #1a1a1a; 
            color: #efefef;
            padding-top: 50px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .game-card {
            display: block;
            padding: 40px 20px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .game-card:hover {
            background: #007acc;
            border-color: #00bfff;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>

    <script>
        function checkPassword() {
            // Set your password here
            const secret = "chicken nugget"; 
            const entry = prompt("Enter the password to access this site:");

            if (entry === secret) {
                // Show the games if correct
                document.getElementById('main-content').style.display = 'block';
            } else {
                // Kick them out or show error if wrong
                alert("Wrong password lol.");
                document.body.innerHTML = "<h1 style='margin-top:100px;'>Refresh to attempt the password again.</h1>";
            }
        }

        // Trigger the password box as soon as the page loads
        window.onload = checkPassword;
    </script>
</head>
<body>

    <div id="main-content">
        <h1>Funny Games</h1>
        <p>Enjoy the games :D</p>

        <div class="grid-container">
            <a href="minecraft.html" target="_blank" class="game-card">⛏️ Minecraft</a>
            <a href="subwaysurfers.html" target="_blank" class="game-card">🚆 Subway Surfers</a>
            <a href="game3/index.html" target="_blank" class="game-card">🍄 Platformer</a>
            <a href="game4/index.html" target="_blank" class="game-card">🧩 Puzzle Lab</a>
        </div>
    </div>

</body>
</html>
